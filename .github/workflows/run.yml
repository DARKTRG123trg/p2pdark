name: Runner
on:
  workflow_dispatch:
    inputs:
      cmd_b64:
        description: 'Base64-encoded command'
        required: true
        default: 'ZWNobyBIZWxsbw=='   # "echo Hello" in base64
permissions: write-all
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute command and update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "${{ github.event.inputs.cmd_b64 }}" | base64 -d > /tmp/cmd.sh
          bash /tmp/cmd.sh > /tmp/out.txt 2>&1
          gh release delete output --yes --cleanup-tag 2>/dev/null || true
          gh release create output --title "Runner Output" --notes "$(cat /tmp/out.txt)" --prerelease
