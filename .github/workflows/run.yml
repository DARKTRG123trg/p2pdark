name: Runner
on:
  workflow_dispatch:
    inputs:
      cmd:
        description: 'Command to run'
        required: true
        default: 'echo Hello'
permissions: write-all
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Execute command and update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ${{ github.event.inputs.cmd }} > /tmp/out.txt 2>&1
          gh release delete output --yes --cleanup-tag 2>/dev/null || true
          gh release create output --title "Runner Output" --notes "$(cat /tmp/out.txt)" --prerelease
